# Production profile
# Uses Railway's auto-injected MySQL environment variables.
# Railway provides: MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Production-lean JPA behavior
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# App port — Railway injects PORT automatically
server.port=${PORT:8080}

# JWT secret must be provided as an environment variable in production.
authorization.jwt.secret=${JWT_SECRET}